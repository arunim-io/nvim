[rocks]

[plugins]
"rocks.nvim" = "2.31.3"
"rocks-treesitter.nvim" = "scm"
"rocks-git.nvim" = "1.5.1"
"rocks-config.nvim" = "2.0.0"
"rocks-lazy.nvim" = "scm"
nvim-lspconfig = "0.1.8"
"schemastore.nvim" = "0.2.0"
luasnip = "2.3.0"
cmp-nvim-lsp = "scm"
cmp-buffer = "scm"
cmp-path = "scm"
cmp-cmdline = "scm"
cmp-git = "scm"
"plenary.nvim" = "scm"
neogit = "1.0.0"
"diffview.nvim" = "scm"
"fidget.nvim" = "1.4.1"


[plugins."conform.nvim"]
version = "5.9.0"
config = "configs.formatters"

[plugins.nvim-lint]
version = "scm"
config = "configs.linters"

[plugins.nvim-cmp]
git = "github:hrsh7th/nvim-cmp"

[plugins.nvim-lightbulb]
version = "1.0.0"
config.autocmd.enabled = true

[plugins.cmp-luasnip]
git = "github:saadparwaiz1/cmp_luasnip"

[plugins.cmp-dotenv]
git = "github:SergioRibera/cmp-dotenv"

[plugins."gitsigns.nvim"]
git = "github:lewis6991/gitsigns.nvim"
rev = "v0.9.0"

[treesitter]
auto_install = true
sync_install = true
highlight.enable = true
incremental_selection.enable = true
indent.enable = true

[bundles.git]
items = ["gitsigns.nvim", "neogit"]
config = 'configs.git'

[bundles.lsp]
items = ["nvim-lspconfig", "nvim-lightbulb", "schemastore.nvim", "cmp-nvim-lsp"]
config = "configs.lsp"

[bundles.completion]
items = [
  "luasnip",
  "nvim-cmp",
  "cmp-nvim-lsp",
  "cmp-buffer",
  "cmp-path",
  "cmp-cmdline",
  "cmp-luasnip",
  "cmp-dotenv",
]
config = "configs.cmp"
