[rocks]

[plugins]
"rocks.nvim" = "2.31.3"
"rocks-treesitter.nvim" = "scm"
"rocks-git.nvim" = "1.5.1"
"rocks-config.nvim" = "2.0.0"
"rocks-lazy.nvim" = "scm"
nvim-lspconfig = "0.1.8"
"schemastore.nvim" = "0.2.0"
cmp-nvim-lsp = "scm"

[plugins."trouble.nvim"]
version = "3.4.3"
opt = true
cmd = "Trouble"
keys = [
  { lhs = "<leader>dd", rhs = "<cmd>Trouble diagnostics toggle filter.buf=0<cr>", desc = "Show diagnostics for current buffer" },
  { lhs = "<leader>dw", rhs = "<cmd>Trouble diagnostics toggle<cr>", desc = "Show diagnostics for current workspace" },
]

[plugins.nvim-lightbulb]
version = "1.0.0"
opt=true
event="LspAttach"
config.autocmd.enabled = true

[plugins."lazydev.nvim"]
git = "folke/lazydev.nvim"

[treesitter]
auto_install = true
sync_install = true
highlight.enable = true
incremental_selection.enable = true
indent.enable = true

[bundles.lsp]
items = [
  "nvim-lspconfig",
  "trouble.nvim",
  "nvim-lightbulb",
  "schemastore.nvim",
  "cmp-nvim-lsp",
]
config = "configs.lsp"
